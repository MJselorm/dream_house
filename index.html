<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Examination</title>
  <script src="scripts/aframe.min.js"></script>
</head>
<body>
  <a-scene>

    <!-- Assets -->
    <a-assets timeout="10000">
      <a-asset-item id="house" src="villa/scene.gltf"></a-asset-item>
      <img id="grassTexture" src="grass.jpg">
    </a-assets>

    <!-- Environment -->
    <a-sky src="Sky Background-56.jpg"></a-sky>
    <a-plane src="#grassTexture" rotation="-90 0 0" width="10000" height="10000" position="0 -3 0" repeat="2000 2000"></a-plane>

    <a-entity
    gltf-model="url(room/scene.gltf)"
    position="3 10 1"
    scale="2 1.2 1.5"
    ></a-entity>

    <a-entity
    gltf-model="url(kitchen/scene.gltf)"
    position="3 2 -1"
    scale="2 2 1.5"
    ></a-entity>

    <a-entity
    gltf-model="url(vintage_living_room/scene.gltf)"
    position="3 1 3"
    rotation="0 180 0"
    scale="2 1.5 1"
    ></a-entity>
<!-- 
    <a-light type="ambient" color="#ffffff" intensity="1.5" position="-25 10 -2"></a-light> -->
    <!-- Lighting -->
    <a-light type="ambient" color="#cce6ff" intensity="0.6"></a-light>
    <a-light type="directional" color="#ffffff" position="5 10 7" intensity="0.8" castShadow="true"></a-light>

    <!-- Camera -->
    <a-camera position="-8 5 30" look-controls wasd-controls></a-camera>
    <!-- House -->
    <a-entity 
      gltf-model="#house" 
      position="0 0 0" 
      rotation="0 0 0"
      scale="2 2 2"
    ></a-entity>

    <!-- Car -->
    <a-entity 
      gltf-model="url(benz/scene.gltf)"
      position="-20 0 10" 
      rotation="0 270 0"
      scale="2 2 2"
    ></a-entity>

    <a-entity 
      gltf-model="url(wagon/scene.gltf)" 
      position="-12 0 10" 
      rotation="0 0 0"
      scale="2 2 2"
    ></a-entity>
  </a-scene>
</body>
</html>
